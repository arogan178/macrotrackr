name: Deploy Macro Tracker

on:
  push:
    branches: [ master ]
  workflow_dispatch:


concurrency:
  group: macro-tracker-production-deploy
  cancel-in-progress: false

jobs:
  quality:
    uses: ./.github/workflows/quality-gate.yml

  deploy-backend:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: backend
    outputs:
      frontend_url: ${{ steps.publish-backend-outputs.outputs.frontend_url }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install backend dependencies
      run: |
        cd backend
        bun install

    - name: Publish backend deployment metadata
      id: publish-backend-outputs
      run: |
        echo "frontend_url=${{ secrets.CORS_ORIGIN }}" >> "$GITHUB_OUTPUT"

    - name: Deploy backend to server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: root
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          cd /var/www/macro-tracker

          # Add bun and pm2 to PATH
          export PATH=$PATH:/root/.bun/bin:/usr/local/bin

          git stash push -m "Automated stash before deployment" --include-untracked || true
          git pull origin master

          # Write backend .env from GitHub environment secrets
          echo "Writing backend environment variables..."
          printf '%s\n' "NODE_ENV=production" "PORT=3000" "HOST=0.0.0.0" "DATABASE_PATH=./macro_tracker.db" "JWT_SECRET=${{ secrets.JWT_SECRET }}" "CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }}" "CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}" "CLERK_WEBHOOK_SECRET=${{ secrets.CLERK_WEBHOOK_SECRET }}" "CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}" "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" "STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}" "STRIPE_PRICE_ID_MONTHLY=${{ secrets.STRIPE_PRICE_ID_MONTHLY }}" "STRIPE_PRICE_ID_YEARLY=${{ secrets.STRIPE_PRICE_ID_YEARLY }}" "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" > backend/.env
          echo "Backend environment variables written"

          # Install backend dependencies
          cd backend
          bun install

          # Restart backend API
          cd ..
          mkdir -p logs
          export PATH=$PATH:/root/.bun/bin:/usr/local/bin
          pm2 reload ecosystem.config.js || {
            echo "PM2 reload failed, attempting restart..."
            pm2 restart ecosystem.config.js || {
              echo "PM2 restart also failed"
              exit 1
            }
          }

          # Check if backend started successfully
          sleep 3
          if pm2 describe macro-tracker-api > /dev/null; then
            echo "Backend API started successfully"
          else
            echo "Backend API failed to start"
            pm2 logs macro-tracker-api --lines 20 || true
            exit 1
          fi

          echo "Backend deployment finished successfully at $(date)"

  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: frontend
    outputs:
      backend_url: ${{ steps.publish-frontend-outputs.outputs.backend_url }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install frontend dependencies
      run: |
        cd frontend
        bun install

    - name: Publish frontend deployment metadata
      id: publish-frontend-outputs
      run: |
        echo "backend_url=${{ secrets.VITE_API_URL }}" >> "$GITHUB_OUTPUT"

    - name: Build frontend
      run: |
        cd frontend
        rm -rf dist/
        rm -rf node_modules/.vite/
        rm -rf .tanstack/

        # Write frontend .env for build
        printf '%s\n' "VITE_API_URL=${{ secrets.VITE_API_URL }}" "VITE_PUBLIC_POSTHOG_KEY=${{ secrets.VITE_PUBLIC_POSTHOG_KEY }}" "VITE_PUBLIC_POSTHOG_HOST=${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}" "VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}" > .env

        echo "Frontend env file contents (API URL):"
        grep VITE_API_URL .env || echo "VITE_API_URL not found in .env"

        export NODE_OPTIONS="--max-old-space-size=4096"
        bun run build
        unset NODE_OPTIONS

    - name: Preflight verify built frontend artifacts
      run: |
        cd frontend

        if [ ! -f dist/index.html ]; then
          echo "ERROR: dist/index.html not found"
          ls -la dist/ 2>/dev/null || echo "dist/ does not exist"
          exit 1
        fi

        if [ ! -f dist/service-worker.js ]; then
          echo "ERROR: dist/service-worker.js not found"
          ls -la dist/
          exit 1
        fi

        ENTRY_JS=$(grep -oE 'assets/index\.[^"]+\.js' dist/index.html | head -n1 || true)
        if [ -z "${ENTRY_JS}" ]; then
          echo "Could not find hashed index bundle in dist/index.html"
          exit 1
        fi

        if [ ! -f "dist/${ENTRY_JS}" ]; then
          echo "dist/index.html references missing bundle: ${ENTRY_JS}"
          echo "Files in dist/assets/:"
          ls -la dist/assets/
          exit 1
        fi

        grep -q '<div id="root"></div>' dist/index.html || {
          echo "dist/index.html is missing #root mount node"
          exit 1
        }

        echo "Frontend build preflight checks passed"

    - name: Deploy frontend dist to server
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: root
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        source: "frontend/dist/"
        target: "/var/www/macro-tracker/frontend/"
        strip_components: 1
        rm: true

    - name: Restart frontend on server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: root
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          export PATH=$PATH:/root/.bun/bin:/usr/local/bin

          cd /var/www/macro-tracker

          # Restart frontend
          pm2 reload ecosystem.config.js || {
            echo "PM2 reload failed, attempting restart..."
            pm2 restart ecosystem.config.js || {
              echo "PM2 restart also failed"
              exit 1
            }
          }

          # Check if frontend process started successfully
          sleep 3
          if pm2 describe macro-frontend > /dev/null; then
            echo "Frontend server started successfully"
          else
            echo "Frontend server failed to start"
            pm2 logs macro-frontend --lines 20 || true
            exit 1
          fi

          echo "Frontend deployment finished successfully at $(date)"

    - name: Purge Cloudflare cache (optional)
      if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ZONE_ID != '' }}
      run: |
        set -euo pipefail

        PURGE_PAYLOAD=$(cat <<'JSON'
        {
          "files": [
            "https://macrotrackr.com/",
            "https://macrotrackr.com/index.html",
            "https://macrotrackr.com/sw.js",
            "https://macrotrackr.com/manifest.webmanifest",
            "https://macrotrackr.com/sitemap.xml"
          ]
        }
        JSON
        )

        RESPONSE=$(curl -sS -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
          -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
          -H "Content-Type: application/json" \
          --data "${PURGE_PAYLOAD}")

        echo "Cloudflare response: ${RESPONSE}"

        echo "${RESPONSE}" | grep -q '"success":true' || {
          echo "Cloudflare cache purge failed"
          exit 1
        }

        echo "Cloudflare cache purge completed"

    - name: Skip Cloudflare cache purge (secrets not configured)
      if: ${{ env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ZONE_ID == '' }}
      run: |
        echo "ℹ️ Skipping Cloudflare cache purge. Configure CLOUDFLARE_API_TOKEN and CLOUDFLARE_ZONE_ID to enable it."

  smoke-test:
    needs:
    - deploy-backend
    - deploy-frontend
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install bun
      uses: oven-sh/setup-bun@v1
    - name: Run smoke tests
      run: |
        cd backend
        bun install
        bun run scripts/smoke-test.ts
      env:
        SMOKE_TEST_URL: ${{ needs.deploy-frontend.outputs.backend_url }}
        FRONTEND_URL: ${{ needs.deploy-backend.outputs.frontend_url }}
