name: Build and Deploy

on:
  push:
    branches:
      - master

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build frontend & backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node (for vite build fallback)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: '1.x'

      - name: Install frontend deps (bun)
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        env:
          NODE_OPTIONS: '--max-old-space-size=2048'
        run: |
          # ensure clean build
          rm -rf dist/ node_modules/.vite/ .tanstack/ || true
          bun run build

      - name: Install backend deps (bun)
        working-directory: backend
        run: bun install --frozen-lockfile

      - name: Archive compiled frontend
        run: |
          tar -czf frontend-dist.tar.gz -C frontend dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist.tar.gz

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist

      - name: Install rsync and ssh
        run: sudo apt-get update && sudo apt-get install -y rsync openssh-client

      - name: Copy code & run remote deploy
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -e

          # Setup SSH key
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Ensure host key checking disabled if required (optionally add known_hosts)
          # NOTE: For production, it's better to add the server's host key to known_hosts
          export RSYNC_RSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          echo "Uploading repository to server..."

          # Use rsync to copy repository files to the server (excluding .git and node_modules)
          rsync -av --delete --exclude='.git' --exclude='node_modules' --exclude='frontend/node_modules' --exclude='frontend/dist' ./ $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH

          echo "Uploading frontend dist artifact..."
          # Upload the built dist archive
          scp -i ~/.ssh/deploy_key frontend-dist.tar.gz $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/frontend-dist.tar.gz

          echo "Running remote deploy script"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "cd $DEPLOY_PATH && ./deploy.sh"

          echo "Deployment completed successfully"
