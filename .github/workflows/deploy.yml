name: Deploy Macro Tracker

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: backend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install backend dependencies
      run: |
        cd backend
        bun install

    - name: Deploy backend to server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: root
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          cd /var/www/macro-tracker

          # Add bun and pm2 to PATH
          export PATH=$PATH:/root/.bun/bin:/usr/local/bin

          git stash push -m "Automated stash before deployment" --include-untracked || true
          git pull origin master

          # Write backend .env from GitHub environment secrets
          echo "Writing backend environment variables..."
          printf '%s\n' "NODE_ENV=production" "PORT=3000" "HOST=0.0.0.0" "DATABASE_PATH=./macro_tracker.db" "JWT_SECRET=${{ secrets.JWT_SECRET }}" "CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }}" "CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}" "CLERK_WEBHOOK_SECRET=${{ secrets.CLERK_WEBHOOK_SECRET }}" "CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}" "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" "STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}" "STRIPE_PRICE_ID_MONTHLY=${{ secrets.STRIPE_PRICE_ID_MONTHLY }}" "STRIPE_PRICE_ID_YEARLY=${{ secrets.STRIPE_PRICE_ID_YEARLY }}" "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" > backend/.env
          echo "✅ Backend environment variables written"

          # Install backend dependencies
          cd backend
          bun install

          # Restart backend API
          cd ..
          mkdir -p logs
          export PATH=$PATH:/root/.bun/bin:/usr/local/bin
          pm2 reload ecosystem.config.js || {
            echo "PM2 reload failed, attempting restart..."
            pm2 restart ecosystem.config.js || {
              echo "PM2 restart also failed"
              exit 1
            }
          }

          # Check if backend started successfully
          sleep 3
          if pm2 describe macro-tracker-api > /dev/null; then
            echo "✅ Backend API started successfully"
          else
            echo "❌ Backend API failed to start"
            pm2 logs macro-tracker-api --lines 20 || true
            exit 1
          fi

          echo "Backend deployment finished successfully at $(date)"

  deploy-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install frontend dependencies
      run: |
        cd frontend
        bun install

    - name: Build frontend
      run: |
        cd frontend
        rm -rf dist/
        rm -rf node_modules/.vite/
        rm -rf .tanstack/
        export NODE_OPTIONS="--max-old-space-size=2048"
        bun run build
        unset NODE_OPTIONS

    - name: Deploy frontend to server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: root
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          cd /var/www/macro-tracker

          # Add bun and pm2 to PATH
          export PATH=$PATH:/root/.bun/bin:/usr/local/bin

          git stash push -m "Automated stash before deployment" --include-untracked || true
          git pull origin master

          # Write frontend .env from GitHub environment secrets
          echo "Writing frontend environment variables..."
          printf '%s\n' "VITE_API_URL=${{ secrets.VITE_API_URL }}" "VITE_PUBLIC_POSTHOG_KEY=${{ secrets.VITE_PUBLIC_POSTHOG_KEY }}" "VITE_PUBLIC_POSTHOG_HOST=${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}" "VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}" > frontend/.env
          echo "✅ Frontend environment variables written"

          # Install frontend dependencies
          cd frontend
          bun install
          cd ..

           # Build frontend
           cd frontend
           rm -rf dist/
           rm -rf node_modules/.vite/
           rm -rf .tanstack/
           export NODE_OPTIONS="--max-old-space-size=2048"
           bun run build
           unset NODE_OPTIONS
           cd ..

           # Inject cache-busting timestamp into service worker
           echo "Injecting cache-busting timestamp into service worker..."
           BUILD_TIMESTAMP=$(date +%s)
           sed -i "s/const BUILD_TIMESTAMP = .*/const BUILD_TIMESTAMP = ${BUILD_TIMESTAMP};/g" frontend/dist/sw.js 2>/dev/null || echo "const BUILD_TIMESTAMP = ${BUILD_TIMESTAMP};" >> frontend/dist/sw.js
           echo "Build timestamp: ${BUILD_TIMESTAMP}"

           # Restart frontend
          export PATH=$PATH:/root/.bun/bin:/usr/local/bin
          pm2 reload ecosystem.config.js || {
            echo "PM2 reload failed, attempting restart..."
            pm2 restart ecosystem.config.js || {
              echo "PM2 restart also failed"
              exit 1
            }
          }

          # Check if frontend started successfully
          sleep 3
          if pm2 describe macro-frontend > /dev/null; then
            echo "✅ Frontend server started successfully"
          else
            echo "❌ Frontend server failed to start"
            pm2 logs macro-frontend --lines 20 || true
            exit 1
          fi

          echo "Frontend deployment finished successfully at $(date)"
