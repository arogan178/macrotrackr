<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6366f1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="image"
      href="/icon.png"
      imagesrcset="/icon.png 1x"
      imagesizes="64px"
    />
    <meta
      name="description"
      content="MacroTrackr — the most intuitive macronutrient tracker to help you hit your nutrition goals."
    />
    <meta
      name="keywords"
      content="macro tracking, macronutrients, nutrition tracker, MacroTrackr, macro tracker"
    />
    <meta name="robots" content="index,follow" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="MacroTrackr" />
    <meta
      property="og:title"
      content="MacroTrackr — Nutrition & Macro Tracking"
    />
    <meta
      property="og:description"
      content="MacroTrackr — the most intuitive macronutrient tracker to help you hit your nutrition goals."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="MacroTrackr — Nutrition & Macro Tracking"
    />
    <meta
      name="twitter:description"
      content="MacroTrackr — the most intuitive macronutrient tracker to help you hit your nutrition goals."
    />
    <meta name="twitter:image" content="/icon.png" />

    <!-- Structured data (Organization) with alternateName to capture common misspelling -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "MacroTrackr",
        "alternateName": ["MacroTracker", "Macro Trackr"],
        "logo": "/icon.png"
      }
    </script>

    <meta name="application-name" content="MacroTrackr" />
    <title>MacroTrackr</title>
  </head>
  <body>
    <noscript>
      MacroTrackr requires JavaScript to run. Please enable JavaScript to use the app.
      <br />
      <a href="/privacy">Privacy Policy</a> | <a href="/terms">Terms of Service</a>
    </noscript>
    <div id="root"></div>
    <div id="modal-root"></div>
    <!-- Add this div for portals -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
