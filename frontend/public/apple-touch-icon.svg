<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bgApple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4338ca;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#1e1b4b" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Rounded rectangle background (Apple style) -->
  <rect width="180" height="180" rx="36" fill="url(#bgApple)"/>
  
  <!-- Professional, clean MT text -->
  <text x="90" y="90" text-anchor="middle" dominant-baseline="middle" font-family="'Inter', 'SF Pro Display', 'Segoe UI', 'Roboto', Arial, sans-serif" font-size="75" font-weight="700" letter-spacing="3px" fill="#fff" filter="url(#shadow)">MT</text>
</svg>
