services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/arogan178/macrotrackr-backend:latest}
    env_file:
      - backend/.env.example
    volumes:
      - ./data:/data
    environment:
      DATABASE_PATH: /data/macrotrackr.db
      APP_MODE: self-hosted
      AUTH_MODE: local
      BILLING_MODE: disabled
      ANALYTICS_MODE: disabled
      EMAIL_MODE: disabled
      APP_URL: http://localhost:5173
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "3000:3000"

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/arogan178/macrotrackr-frontend:latest}
    depends_on:
      - backend
    ports:
      - "5173:80"
